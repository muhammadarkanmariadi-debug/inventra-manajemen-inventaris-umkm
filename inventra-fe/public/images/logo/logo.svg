<svg width="420" height="140" viewBox="0 0 420 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Box -->
  <defs>
    <linearGradient id="boxGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#465fff"/>
      <stop offset="100%" stop-color="#2a31d8"/>
    </linearGradient>

    <linearGradient id="checkGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Cube -->
  <rect x="20" y="40" width="70" height="60" rx="10" fill="url(#boxGradient)"/>

  <!-- Open Lid -->
  <polygon points="20,40 55,20 125,20 90,40" fill="#7592ff"/>
  <polygon points="90,40 125,20 125,40" fill="#465fff"/>

  <!-- Checkmark -->
  <path d="M40 65 L60 85 L95 50" stroke="url(#checkGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <circle cx="110" cy="25" r="3" fill="#9cb9ff"/>
  <circle cx="105" cy="40" r="2" fill="#9cb9ff"/>
  <circle cx="95" cy="30" r="2" fill="#9cb9ff"/>

  <!-- Text -->
  <text x="150" y="80"
        font-family="Inter, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        fill="#1d2a4d">
        Inventra
  </text>

</svg>