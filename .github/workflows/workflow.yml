name: inventra-ci

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    changes:
        runs-on: ubuntu-latest    
        outputs:
            frontend: ${{ steps.filter.outputs.frontend }}
            backend: ${{ steps.filter.outputs.backend }}
        steps:
            - uses: actions/checkout@v6.0.2
            
            - name: Detect Changes
              id: filter
              uses: dorny/paths-filter@v3.0.2
              with: 
                filters: | 
                    frontend:
                        - 'inventra-fe/**'
                    backend:    
                        - 'inventra-be/**'
                        
    frontend:
        needs: changes
        if: needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        
        
        defaults:
            run:
                working-directory: inventra-fe
        
        steps:
            - uses: actions/checkout@v4        
        
            - name: Setup NodeJS
              uses: actions/setup-node@v6
              with:
                    node-version: 22
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            
            - name: Install Deps 
              run: npm ci
              
            - name: Check Lint
              run: npm run lint
            
            - name: Build Frontend
              run: npm run build


    backend:
        needs: changes
        if: needs.changes.outputs.backend == 'true' 
        runs-on: ubuntu-latest


        defaults:
          run:
            working-directory: inventra-be
        services:
            mysql:
                image: mariadb:10.6
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: inventra
                ports: 
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=3   
                
            redis:
                image: redis:7
                ports:
                    - 6379:6379
        
             
        steps:            
          - uses: actions/checkout@v4
          - name: Setup PHP
            uses: shivammathur/setup-php@v2
            with:
               php-version: 8.3
               extensions: mbstring, bcmath, pdo_mysql, redis
               coverage: none

          - name: Install Composer deps
            run: composer install --no-interaction --prefer-dist

          - name: Copy env
            run: cp .env.example .env

          - name: Generate key
            run: php artisan key:generate

          - name: Run migrations
            env:
                DB_HOST: 127.0.0.1
                DB_CONNECTION: mysql
                DB_DATABASE: test_db
                DB_PORT: 3306
                DB_PASSWORD: root
                DB_USERNAME: root
            run: php artisan migrate --force

          - name: Run tests
            run: php artisan test --if-present            
              
